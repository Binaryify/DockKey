name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package DockKey
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
            version="0.1.0"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "build=${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Build release artifacts
        run: |
          make release-artifacts \
            VERSION="${{ steps.version.outputs.version }}" \
            BUILD_NUMBER="${{ steps.version.outputs.build }}" \
            ARTIFACT_VERSION="${{ steps.version.outputs.tag }}"
          file build/DockKey.app/Contents/MacOS/DockKey
          test "$(uname -m)" = "arm64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DockKey-${{ steps.version.outputs.tag }}-arm64
          path: |
            dist/DockKey-${{ steps.version.outputs.tag }}-arm64.zip
            dist/DockKey-${{ steps.version.outputs.tag }}-arm64.zip.sha256
            dist/DockKey-${{ steps.version.outputs.tag }}-arm64.dmg
            dist/DockKey-${{ steps.version.outputs.tag }}-arm64.dmg.sha256

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/DockKey-${{ steps.version.outputs.tag }}-arm64.zip" \
            "dist/DockKey-${{ steps.version.outputs.tag }}-arm64.zip.sha256" \
            "dist/DockKey-${{ steps.version.outputs.tag }}-arm64.dmg" \
            "dist/DockKey-${{ steps.version.outputs.tag }}-arm64.dmg.sha256" \
            --title "DockKey ${{ steps.version.outputs.tag }}" \
            --notes "Apple Silicon arm64 build of DockKey."
